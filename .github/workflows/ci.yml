name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · build (thumbv7em-none-eabihf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rustup installs the toolchain + target + components from rust-toolchain.toml.
      - name: Set up toolchain
        run: rustup show

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: Build (release, both crates)
        run: cargo build --workspace --release
